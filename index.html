.header{background:#1e293b;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155}

.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}

.g7{grid-template-columns:repeat(7,1fr)}
.card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:20px}

.chart-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:#0f172a;color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}
td{padding:8px 12px;border-bottom:1px solid #1e293b}
tr:hover{background:#1e293b}
.table-wrap{max-height:600px;overflow-y:auto;border-radius:10px;border:1px solid #334155}
.status-esaurito{color:#ef4444;font-weight:600}
.status-critico{color:#f97316;font-weight:600}
.status-basso{color:#eab308;font-weight:600}
.status-ok{color:#22c55e;font-weight:600}
.status-nuovo{color:#facc15;font-weight:700}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}

.filter-btn{background:#334155;border:none;color:#e2e8f0;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:#f97316;color:#fff}
.filter-count{color:#64748b;font-size:13px;margin-left:auto}
.container-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600}
.ct-06{background:#dc2626;color:#fff}
.ct-01{background:#2563eb;color:#fff}
.ct-02{background:#16a34a;color:#fff}
.incoming-val{font-weight:600}
.coverage-arrow{color:#22c55e;font-size:11px;margin-left:4px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:flex-start;padding-top:40px}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border:1px solid #334155;border-radius:12px;width:90%;max-width:800px;max-height:85vh;overflow-y:auto;padding:28px}
.modal h2{font-size:18px;margin-bottom:20px}
.modal .close{float:right;background:none;border:none;color:#94a3b8;font-size:24px;cursor:pointer}
.modal table{font-size:12px}
.old-tag{background:#6b7280;color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:4px}
.new-tag{background:#facc15;color:#000;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:4px}
.old-row{opacity:0.5}
.card-alert{border-color:#dc2626}
@media(max-width:900px){.g6,.g7{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:1fr 1fr}}
</style>

function init(){
const nav = document.getElementById('nav');
tabs.forEach(t => {
const btn = document.createElement('button');
btn.textContent = t.label;
btn.onclick = () => switchTab(t.id);
btn.id = 'tab-'+t.id;
nav.appendChild(btn);
});
switchTab('overview');
}

function switchTab(id){
currentTab = id;
document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
document.getElementById('tab-'+id).classList.add('active');
render();
}

function render(){
const app = document.getElementById('app');
switch(currentTab){
case 'overview': app.innerHTML = renderOverview(); initCharts(); break;
case 'products': app.innerHTML = renderProducts(); break;
case 'sales': app.innerHTML = renderSales(); initSalesCharts(); break;
case 'scot': app.innerHTML = renderScot(); break;
case 'imports': app.innerHTML = renderImports(); break;
}
}

function fmt(n){return n!=null?n.toLocaleString('it-IT'):'—'}
function fmtE(n){return n!=null?'€'+n.toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:0}):'—'}

function renderProducts(){
let filtered = DATA.products.filter(p => !p.is_old);
const totalVisible = filtered.length;

if(productFilter==='esauriti') filtered = filtered.filter(p=>p.status==='esaurito');
else if(productFilter==='critici') filtered = filtered.filter(p=>p.status==='critico');
else if(productFilter==='basso') filtered = filtered.filter(p=>p.status==='basso');
else if(productFilter==='arrivi') filtered = filtered.filter(p=>p.incoming_total>0);
else if(productFilter==='new') filtered = filtered.filter(p=>p.is_new);
else if(productFilter==='old') filtered = DATA.products.filter(p=>p.is_old);

if(productSearch){
const s = productSearch.toLowerCase();
filtered = filtered.filter(p=>p.sku.toLowerCase().includes(s)||p.name.toLowerCase().includes(s));
}

filtered.sort((a,b)=>{
if(a.is_new && !b.is_new) return -1;
if(!a.is_new && b.is_new) return 1;
const order={esaurito:0,critico:1,basso:2,ok:3,nuovo:0};
return (order[a.status]||4)-(order[b.status]||4);
});

let rows = '';
filtered.forEach(p=>{
const isNew = p.is_new;
const isOld = p.is_old;
const rowClass = isOld ? ' class="old-row"' : '';
const tag = isNew ? '<span class="new-tag">NEW</span>' : (isOld ? '<span class="old-tag">OLD</span>' : '');

const tot = p.incoming_total>0?'<span style="color:#22c55e;font-weight:600">'+p.incoming_total+'</span>':'—';
const cov = p.coverage_months.toFixed(1)+' mesi';
const covArr = p.coverage_with_incoming>p.coverage_months?' <span class="coverage-arrow">→ '+p.coverage_with_incoming.toFixed(1)+'</span>':'';
const statusClass = 'status-'+(isNew?'nuovo':p.status);
const statusText = isNew?'NUOVO':p.status.toUpperCase();
rows += '<tr'+rowClass+' onclick="showProductModal(\''+p.sku+'\')" style="cursor:pointer"><td>'+p.sku+tag+'</td><td>'+p.name+'</td><td style="text-align:right;font-weight:600;color:'+(p.stock>0?'#22c55e':'#ef4444')+'">'+p.stock+'</td><td>'+Math.round(p.avg_monthly)+'/m</td><td>'+i06+'</td><td>'+i01+'</td><td>'+i02+'</td><td>'+tot+'</td><td>'+cov+covArr+'</td><td class="'+statusClass+'">'+statusText+'</td></tr>';
});

return '<div class="content active">'+
'<h2 style="margin-bottom:6px">Prodotti & Scorte — Analisi Integrata</h2>'+
'<p style="color:#64748b;font-size:13px;margin-bottom:16px">Dati incrociati: giacenza SCOT, vendite Shopify, arrivi dai container Dropbox, catalogo Airtable. <span class="container-tag ct-06">06</span> = ETA 15 Mar <span class="container-tag ct-01">01</span> = ETA Mag <span class="container-tag ct-02">02</span> = ETA Giu</p>'+

'<input type="text" placeholder="Cerca SKU o nome..." oninput="productSearch=this.value;render()">'+

'<span class="filter-count">'+filtered.length+' prodotti</span>'+
'</div>'+

modal.innerHTML = '<button class="close" onclick="closeModal()">✕</button>'+
'<h2>'+p.sku+' — '+p.name+' '+tag+oldTag+'</h2>'+
(isOld?'<div style="background:#7f1d1d;border:1px solid #dc2626;border-radius:8px;padding:12px;margin-bottom:16px;color:#fca5a5">⚠️ Questo prodotto è stato rimosso dal catalogo (CANCELED in Airtable). Non viene più mostrato nella lista principale.</div>':'')+
(isNew?'<div style="background:#713f12;border:1px solid #facc15;border-radius:8px;padding:12px;margin-bottom:16px;color:#fef08a">🆕 Nuovo prodotto! Presente nel catalogo Airtable e nei container in arrivo, ma non ancora venduto né in magazzino SCOT.</div>':'')+
'<div class="grid g3">'+
'<div class="card"><div class="card-label">Giacenza SCOT</div><div class="card-value">'+p.stock+'</div></div>'+
'<div class="card"><div class="card-label">Vendita Media</div><div class="card-value">'+(p.avg_monthly>0?Math.round(p.avg_monthly)+'/m':'—')+'</div></div>'+
'<div class="card"><div class="card-label">Copertura Attuale</div><div class="card-value" style="color:'+(p.coverage_months<2?'#ef4444':p.coverage_months<4?'#f97316':'#22c55e')+'">'+p.coverage_months.toFixed(1)+' mesi</div></div></div>'+
incomingSection+reorderSection;

document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});

function renderSales(){
const m = DATA.monthly;
let rows = '';
m.slice().reverse().forEach(r=>{
rows += '<tr><td>'+r.month+'</td><td>'+fmt(r.orders)+'</td><td>'+fmtE(r.revenue)+'</td><td>'+fmtE(Math.round(r.revenue/Math.max(r.orders,1)))+'</td></tr>';
});
return '<div class="content active">'+
'<h2 style="margin-bottom:16px">Vendite Shopify — Trend Mensile</h2>'+
'<div class="grid g2" style="margin-bottom:24px">'+
'<div class="chart-card"><div class="chart-title"><span class="dot" style="background:#ef4444"></span>Fatturato Mensile</div><canvas id="salesRevenueChart"></canvas></div>'+
'<div class="chart-card"><div class="chart-title"><span class="dot" style="background:#3b82f6"></span>Ordini al Mese</div><canvas id="salesOrdersChart"></canvas></div>'+
'</div>'+
'<div class="table-wrap"><table><thead><tr><th>Mese</th><th>Ordini</th><th>Fatturato</th><th>Medio</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function renderScot(){
let sorted = [...DATA.scot_inventory].sort((a,b)=>b.qty-a.qty);
let rows = '';
sorted.forEach(s=>{
const isOld = s.is_old;
const tag = isOld?'<span class="old-tag">OLD</span>':'';
const rowStyle = isOld?' style="opacity:0.5;background:#1c1917"':'';
rows += '<tr'+rowStyle+'><td>'+s.sku+tag+'</td><td>'+s.name+'</td><td style="text-align:right;font-weight:600;color:#22c55e">'+fmt(s.qty)+'</td><td>'+(isOld?'<span style="color:#ef4444">Fuori catalogo</span>':'Attivo')+'</td></tr>';
});
const oldCount = DATA.scot_inventory.filter(s=>s.is_old).length;
const oldStock = DATA.scot_inventory.filter(s=>s.is_old).reduce((a,s)=>a+s.qty,0);
return '<div class="content active">'+
'<h2 style="margin-bottom:6px">Giacenza SCOT — Magazzino Live</h2>'+
'<p style="color:#64748b;font-size:13px;margin-bottom:16px">Dati FTP SCOT aggiornati al '+DATA.kpi.stock_date+'. '+oldCount+' prodotti OLD ('+fmt(oldStock)+' pz) fuori catalogo.</p>'+
'<div class="grid g4" style="margin-bottom:20px">'+
'<div class="card"><div class="card-label">Stock Totale</div><div class="card-value">'+fmt(DATA.kpi.stock_live)+'</div></div>'+
'<div class="card"><div class="card-label">SKU Attivi</div><div class="card-value">'+DATA.kpi.active_skus+'</div></div>'+
'<div class="card"><div class="card-label">OLD (fuori catalogo)</div><div class="card-value" style="color:#f97316">'+oldCount+'</div><div class="card-sub">'+fmt(oldStock)+' bottiglie</div></div>'+
'<div class="card"><div class="card-label">Top SKU</div><div class="card-value">'+sorted[0].sku+'</div><div class="card-sub">'+fmt(sorted[0].qty)+' pz</div></div></div>'+
'<div class="table-wrap"><table><thead><tr><th>SKU</th><th>Prodotto</th><th style="text-align:right">Quantità</th><th>Stato Catalogo</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function renderImports(){
const imp = DATA.imports;
let cards = '';
imp.forEach((c,i)=>{
const cls = ['ct-06','ct-01','ct-02'][i];
const statusIcon = c.status==='in_transit'?'🚢':'📦';
cards += '<div class="card" style="cursor:pointer" onclick="showImportModal('+i+')"><div class="card-label">'+c.name+'</div><div class="card-value" style="font-size:20px">'+statusIcon+' '+c.status_label+'</div><div class="card-sub">'+c.eta+'<br>'+c.products+' prodotti · '+fmt(c.bottles)+' bottiglie</div></div>';
});
return '<div class="content active">'+
'<h2 style="margin-bottom:16px">Importazioni — Container dal Giappone</h2>'+
'<div class="grid g3">'+cards+'</div></div>';
}

function showImportModal(idx){
const c = DATA.imports[idx];
const modal = document.getElementById('modalContent');
let rows = '';
if(c.product_list){
c.product_list.forEach(p=>{
rows += '<tr><td>'+p.sku+'</td><td>'+p.name+'</td><td style="text-align:right;font-weight:600">'+p.qty+'</td></tr>';
});
}
modal.innerHTML = '<button class="close" onclick="closeModal()">✕</button>'+
'<h2>'+c.name+' — '+c.status_label+'</h2>'+
'<p style="color:#94a3b8;margin-bottom:16px">'+c.eta+' · '+c.products+' prodotti · '+fmt(c.bottles)+' bottiglie</p>'+
'<div class="table-wrap"><table><thead><tr><th>SKU</th><th>Prodotto</th><th style="text-align:right">Quantità</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
document.getElementById('modalOverlay').classList.add('show');
}

function initCharts(){
const m = DATA.monthly;
const labels = m.map(r=>r.month);
new Chart(document.getElementById('revenueChart'),{type:'line',data:{labels,datasets:[{data:m.map(r=>r.revenue),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.1)',fill:true,tension:.3,pointRadius:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1e293b'}},y:{ticks:{color:'#64748b',callback:v=>fmtE(v)},grid:{color:'#1e293b'}}}}});
new Chart(document.getElementById('ordersChart'),{type:'bar',data:{labels,datasets:[{data:m.map(r=>r.orders),backgroundColor:'rgba(34,197,94,.6)',borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748b'},grid:{color:'#1e293b'}}}}});
}

function initSalesCharts(){
const m = DATA.monthly;
const labels = m.map(r=>r.month);
new Chart(document.getElementById('salesRevenueChart'),{type:'line',data:{labels,datasets:[{data:m.map(r=>r.revenue),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.1)',fill:true,tension:.3,pointRadius:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1e293b'}},y:{ticks:{color:'#64748b',callback:v=>fmtE(v)},grid:{color:'#1e293b'}}}}});
new Chart(document.getElementById('salesOrdersChart'),{type:'bar',data:{labels,datasets:[{data:m.map(r=>r.orders),backgroundColor:'rgba(59,130,246,.6)',borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748b'},grid:{color:'#1e293b'}}}}});
}

init();
</script>
